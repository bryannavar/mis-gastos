name: Aplicar Gastos Fijos

on:
  schedule:
    - cron: '0 6 * * *'  # Medianoche hora CR (UTC-6 = 06:00 UTC)
  workflow_dispatch:  # Permite correrlo manualmente para probar

jobs:
  aplicar:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar Edge Function
        run: |
          curl -X POST \
            https://kgdxzylsdpnmfbdntyyl.supabase.co/functions/v1/aplicar-gastos-fijos \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
